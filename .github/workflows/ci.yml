name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true # tighten once per-app lint configs land in M3

      - name: Format check
        run: pnpm format:check
        continue-on-error: true

  backend:
    name: Backend (Django checks + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: offside_crm_test
          POSTGRES_USER: offside
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U offside"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://offside:test_password@localhost:5432/offside_crm_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: offside_crm.settings.dev
      DJANGO_SECRET_KEY: ci-only-not-a-real-secret
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .
        continue-on-error: true # tightens as the codebase grows

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .
        continue-on-error: true

      - name: Migrations check
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
        continue-on-error: true # M1 lands the first real models

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Tests
        working-directory: backend
        run: pytest
        continue-on-error: true # M1 lands the first real tests

  openapi-drift:
    name: OpenAPI codegen drift
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: |
          echo "OpenAPI drift check is wired in M1 once Django serves a real schema."
          echo "It will: boot Django, fetch /api/schema/, run pnpm codegen:openapi,"
          echo "and fail if the generated TS/Swift clients differ from what's committed."
