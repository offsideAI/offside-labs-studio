# xcodegen source-of-truth.
# Regenerate the Xcode project with `pnpm ios:gen` (or `xcodegen generate` from this dir).
# OffsideCRM.xcodeproj/ is gitignored — every contributor regenerates locally.

name: OffsideCRM

options:
  bundleIdPrefix: ai.offside
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  OffsideCRM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OffsideCRM
      - path: Generated
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.offside.crm
        PRODUCT_NAME: Offside CRM
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1" # iPhone only in MVP; iPad post-MVP per POST-12
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Offside CRM
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsMultipleScenes: "NO"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      properties:
        # Backend base URL — override per-build for staging/prod (see README).
        OffsideApiBaseUrl: "http://localhost:8000"
        # Localhost dev needs an ATS exception so URLSession can hit plain HTTP.
        # Production builds talk only to https://crm-api.offside.ai and don't need this.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
